<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ralph orchestration concept art</title>
  <desc id="desc">A cinematic command room concept image showing Codex directing Claude Code workers through a verified Ralph runtime loop.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#1D4DFF" stop-opacity="0.36"/>
      <stop offset="0.46" stop-color="#0B162E" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#05070D"/>
    </radialGradient>
    <linearGradient id="glass" x1="210" y1="110" x2="1390" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182844" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#070B14" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="premium" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9BE7FF"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7EF0C1"/>
      <stop offset="1" stop-color="#1BAA8B"/>
    </linearGradient>
    <linearGradient id="verify" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
