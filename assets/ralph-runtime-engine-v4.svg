<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ralph runtime engine</title>
  <desc id="desc">A high-impact circular engine diagram showing the Ralph loop: Plan, Build, Verify, Review, Persist, then continue to the next story.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse"><stop stop-color="#020617"/><stop offset="0.52" stop-color="#0F172A"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <linearGradient id="ring" x1="420" y1="120" x2="1180" y2="780" gradientUnits="userSpaceOnUse"><stop stop-color="#60A5FA"/><stop offset="0.35" stop-color="#34D399"/><stop offset="0.7" stop-color="#FBBF24"/><stop offset="1" stop-color="#C084FC"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop stop-color="#60A5FA" stop-opacity="0.28"/><stop offset="1" stop-color="#60A5FA" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/></filter>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="12" result="b"/><feBlend in="SourceGraphic" in2="b" mode="screen"/></filter>
  </defs>
  <rect width="1600" height="900" rx="44" fill="url(#bg)"/>
  <circle cx="800" cy="470" r="420" fill="url(#glow)"/>
  <text x="100" y="126" fill="#F8FAFC" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="66" font-weight="850" letter-spacing="-1.8">Fresh-context runtime engine</text>
  <text x="104" y="176" fill="#A8B7CC" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="500">Every story starts clean. Only verified evidence survives.</text>
  <g opacity="0.12"><circle cx="800" cy="470" r="326" stroke="#CBD5E1"/><circle cx="800" cy="470" r="238" stroke="#CBD5E1"/><circle cx="800" cy="470" r="150" stroke="#CBD5E1"/></g>
  <g filter="url(#blurGlow)"><path d="M800 162C970 162 1108 300 1108 470C1108 640 970 778 800 778C630 778 492 640 492 470C492 300 630 162 800 162Z" stroke="url(#ring)" stroke-width="16" stroke-linecap="round" stroke-dasharray="720 90 280 80"/></g>
  <g filter="url(#shadow)"><circle cx="800" cy="470" r="120" fill="#07101F" stroke="#334155" stroke-width="2"/><text x="712" y="456" fill="#E0F2FE" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="850">RALPH</text><text x="686" y="504" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="900">LOOP</text></g>
  <g filter="url(#shadow)"><rect x="640" y="108" width="320" height="118" rx="30" fill="#08162D" stroke="#60A5FA" stroke-width="2"/><text x="696" y="158" fill="#93C5FD" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="850">01</text><text x="746" y="178" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900">Plan</text></g>
  <g filter="url(#shadow)"><rect x="1086" y="318" width="320" height="118" rx="30" fill="#062319" stroke="#34D399" stroke-width="2"/><text x="1142" y="368" fill="#A7F3D0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="850">02</text><text x="1192" y="388" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900">Build</text></g>
  <g filter="url(#shadow)"><rect x="1048" y="620" width="320" height="118" rx="30" fill="#251A08" stroke="#FBBF24" stroke-width="2"/><text x="1104" y="670" fill="#FDE68A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="850">03</text><text x="1154" y="690" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900">Verify</text></g>
  <g filter="url(#shadow)"><rect x="232" y="620" width="320" height="118" rx="30" fill="#111827" stroke="#CBD5E1" stroke-width="2"/><text x="288" y="670" fill="#CBD5E1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="850">04</text><text x="338" y="690" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900">Review</text></g>
  <g filter="url(#shadow)"><rect x="194" y="318" width="320" height="118" rx="30" fill="#1B1230" stroke="#C084FC" stroke-width="2"/><text x="250" y="368" fill="#E9D5FF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="850">05</text><text x="300" y="388" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="900">Persist</text></g>
  <g filter="url(#shadow)"><rect x="300" y="798" width="1000" height="54" rx="27" fill="#030712" stroke="#334155"/><text x="372" y="834" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">fresh context → bounded evidence → next story</text></g>
</svg>