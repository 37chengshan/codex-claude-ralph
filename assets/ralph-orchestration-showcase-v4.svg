  <text x="102" y="124" fill="#F8FAFC" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="64" font-weight="850" letter-spacing="-1.6">Codex commands. Claude ships.</text>
  <text x="106" y="174" fill="#A8B7CC" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="500">Ralph keeps the loop bounded, verified, and restartable.</text>
